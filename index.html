<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sonor AI Pipeline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}

.hdr{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.hdr h1{font-size:17px;font-weight:600;color:#f0f6fc}
.hdr h1 b{color:#58a6ff}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:12px;color:#8b949e}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-ok{background:#3fb950}.dot-err{background:#f85149}

.ctn{max-width:1280px;margin:0 auto;padding:16px}

.controls{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.ctrl{background:#161b22;border:2px solid #30363d;border-radius:10px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;transition:border-color .3s,background .3s}
.ctrl.on{border-color:#238636;background:rgba(35,134,54,.06)}
.ctrl-info h3{font-size:13px;font-weight:600;color:#f0f6fc}
.ctrl-info p{font-size:11px;color:#8b949e;margin-top:2px}
.sw{position:relative;width:44px;height:24px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0}
.sw .tr{position:absolute;cursor:pointer;inset:0;background:#30363d;border-radius:24px;transition:.25s}
.sw .tr:before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#8b949e;border-radius:50%;transition:.25s}
.sw input:checked+.tr{background:#238636}
.sw input:checked+.tr:before{transform:translateX(20px);background:#fff}
.sw input:disabled+.tr{opacity:.4;cursor:wait}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:700;color:#f0f6fc}
.stat-lbl{font-size:11px;color:#8b949e;margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

.health{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 16px;margin-bottom:16px;font-size:12px;color:#8b949e;display:none;justify-content:space-between;flex-wrap:wrap;gap:6px}
.health b{color:#58a6ff;font-weight:500}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:16px;overflow:hidden}
.card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#8b949e;margin-bottom:14px}
.full{grid-column:1/-1}

.fun-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #21262d;font-size:13px}
.fun-row:last-child{border-bottom:none}
.fun-icon{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.fun-name{width:120px;color:#c9d1d9;flex-shrink:0}
.fun-count{width:40px;text-align:right;font-weight:700;color:#f0f6fc;flex-shrink:0}
.fun-bar-wrap{flex:1;height:18px;background:#21262d;border-radius:3px;overflow:hidden;min-width:60px}
.fun-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.34,1.56,.64,1);min-width:2px}
.fun-pct{width:45px;text-align:right;font-size:12px;color:#8b949e;flex-shrink:0}
.bar-g{background:linear-gradient(90deg,#238636,#3fb950)}.bar-y{background:#9e6a03}.bar-r{background:#da3633}.bar-x{background:#30363d}

.q-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #21262d;font-size:13px}
.q-item:last-child{border-bottom:none}
.q-badge{padding:3px 12px;border-radius:12px;font-size:12px;font-weight:600}
.q-hi{background:#9e6a0333;color:#d29922}.q-lo{background:#21262d;color:#8b949e}

.cr-row{padding:10px 0;border-bottom:1px solid #21262d}
.cr-row:last-child{border-bottom:none}
.cr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cr-provider{font-size:13px;font-weight:600;color:#f0f6fc;text-transform:capitalize}
.cr-pct{font-size:20px;font-weight:700}
.cr-pct.hi{color:#3fb950}.cr-pct.md{color:#d29922}.cr-pct.lo{color:#f85149}
.cr-bar{height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin-bottom:4px}
.cr-fill{height:100%;border-radius:3px;transition:width .5s}
.cr-detail{font-size:11px;color:#8b949e}

.task{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #21262d;font-size:13px}
.task:last-child{border-bottom:none}
.pulse{width:8px;height:8px;border-radius:50%;background:#9e6a03;animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(158,106,3,.6)}50%{box-shadow:0 0 0 5px rgba(158,106,3,0)}}
.pulse.stuck{background:#f85149;animation-name:pulse-r}
@keyframes pulse-r{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.6)}50%{box-shadow:0 0 0 5px rgba(248,81,73,0)}}
.task-name{flex:1;color:#f0f6fc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:#9e6a0333;color:#d29922;text-transform:uppercase}
.task-time{font-size:12px;color:#8b949e;font-variant-numeric:tabular-nums;min-width:50px;text-align:right}
.task-time.warn{color:#d29922;font-weight:600}.task-time.danger{color:#f85149;font-weight:600}
.empty{color:#484f58;font-size:13px;font-style:italic;padding:10px 0}

.log-filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.log-btn{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:500;background:#21262d;color:#8b949e;border:none;cursor:pointer;transition:all .2s}
.log-btn:hover{background:#30363d;color:#e1e4e8}
.log-btn.act{background:#58a6ff22;color:#58a6ff}
.log-wrap{max-height:350px;overflow-y:auto}
.log-wrap::-webkit-scrollbar{width:5px}
.log-wrap::-webkit-scrollbar-thumb{background:#30363d;border-radius:3px}
.log{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #21262d;font-size:12px}
.log:last-child{border-bottom:none}
.log-time{width:35px;text-align:right;color:#8b949e;flex-shrink:0;font-variant-numeric:tabular-nums}
.log-tag{padding:3px 7px;border-radius:5px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0;min-width:65px;text-align:center}
.t-scrape{background:#9e6a0333;color:#d29922}
.t-icp{background:#6639ba33;color:#a371f7}
.t-enrich{background:#3fb95033;color:#58a6ff}
.t-health{background:#21262d;color:#8b949e}
.t-error{background:#da363333;color:#f85149}
.t-reset{background:#9e6a0322;color:#d2822d}
.t-research{background:#3fb95033;color:#3fb950}
.log-msg{flex:1;color:#c9d1d9;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-cnt{font-weight:600;color:#f0f6fc;background:#21262d;padding:1px 6px;border-radius:4px;font-size:11px;flex-shrink:0}

@media(max-width:768px){
  .controls{grid-template-columns:1fr}
  .stats{grid-template-columns:repeat(2,1fr)}
  .grid{grid-template-columns:1fr}
  .fun-bar-wrap{display:none}.fun-pct{width:35px}
  .log-tag{min-width:50px;font-size:9px}
}
</style>
</head>
<body>
<div class="hdr"><h1><b>Sonor AI</b> Pipeline</h1><div class="hdr-r"><span class="dot dot-ok" id="dot"></span><span id="upd">Loading...</span></div></div>
<div class="ctn">
  <div class="controls" id="ctrls"></div>
  <div class="stats" id="stats"></div>
  <div class="health" id="health"></div>
  <div class="grid">
    <div class="card"><div class="card-title">Pipeline Funnel</div><div id="funnel"></div></div>
    <div class="card"><div class="card-title">API Credits</div><div id="credits"></div></div>
    <div class="card"><div class="card-title">Queue Depth</div><div id="queue"></div></div>
    <div class="card"><div class="card-title">Active Tasks</div><div id="tasks"></div></div>
    <div class="card full"><div class="card-title">Activity Log</div><div class="log-filters" id="logF"></div><div class="log-wrap" id="logs"></div></div>
  </div>
</div>
<script>
var API="https://qcslipdgzgnmojspjzyn.supabase.co/functions/v1/pipeline-dashboard";
var G=function(id){return document.getElementById(id)};
var curF="all";

function api(b){return fetch(API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)}).then(function(r){return r.json()});}

document.addEventListener("change",function(e){
  var inp=e.target;
  if(inp.dataset&&inp.dataset.ctrl){
    inp.disabled=true;
    api({action:"toggle",name:inp.dataset.ctrl,enabled:inp.checked}).then(load).finally(function(){inp.disabled=false});
  }
});

function uc(s){return s.replace(/_/g," ").split(" ").map(function(w){return w.charAt(0).toUpperCase()+w.slice(1)}).join(" ")}

function getCat(a){
  if(a.indexOf("scrape")>=0)return"scrape";
  if(a.indexOf("icp")>=0)return"icp";
  if(a.indexOf("enrich")>=0||a.indexOf("post_enrich")>=0)return"enrich";
  if(a.indexOf("error")>=0||a.indexOf("fail")>=0)return"error";
  if(a.indexOf("reset")>=0||a.indexOf("stuck")>=0)return"reset";
  if(a.indexOf("deep")>=0)return"research";
  return"system";
}

function tagCls(c){
  var m={scrape:"t-scrape",icp:"t-icp",enrich:"t-enrich",error:"t-error",reset:"t-reset",research:"t-research"};
  return m[c]||"t-health";
}

function render(d){
  var defs={scraping:"Apify scrapes + processing",enrichment:"ICP, email, post-enrich",deep_research:"Personalization data"};
  var ch="";
  (d.controls||[]).forEach(function(c){
    ch+='<div class="ctrl'+(c.enabled?' on':'')+'"><div class="ctrl-info"><h3>'+uc(c.name)+'</h3><p>'+(defs[c.name]||'')+'</p></div>';
    ch+='<label class="sw"><input type="checkbox" data-ctrl="'+c.name+'"'+(c.enabled?' checked':'')+'><span class="tr"></span></label></div>';
  });
  G("ctrls").innerHTML=ch;

  var t=d.totals||{},s=d.scrapes||{};
  G("stats").innerHTML=[
    {v:t.companies||0,l:"Companies"},
    {v:t.leads||0,l:"Leads"},
    {v:s.done||0,l:"Scrapes Done"},
    {v:s.pending||0,l:"Pending"}
  ].map(function(x){return'<div class="stat"><div class="stat-val">'+x.v+'</div><div class="stat-lbl">'+x.l+'</div></div>'}).join("");

  var hc=d.health;
  if(hc){G("health").style.display="flex";G("health").innerHTML='<span>Last check: <b>'+hc.ago+'</b></span><span>stuck='+(hc.stuck_tasks_reset||0)+' icp='+(hc.icp_queued||0)+' enrich='+(hc.enrichments_queued||0)+' scrape='+(hc.scrapes_dispatched||0)+'</span>';}

  var f=d.funnel||{},total=0;
  var ord=["not_enriched","icp_checking","enriching","processing","enriched","deep_researching","icp_failed","no_email_found","disqualified","invalid_email"];
  var colors={enriched:"bar-g",enriching:"bar-y",icp_checking:"bar-y",processing:"bar-y",deep_researching:"bar-y",icp_failed:"bar-r",no_email_found:"bar-r",disqualified:"bar-r",not_enriched:"bar-x"};
  var icons={enriched:"#3fb950",enriching:"#9e6a03",icp_checking:"#9e6a03",processing:"#9e6a03",deep_researching:"#9e6a03",icp_failed:"#da3633",no_email_found:"#da3633",disqualified:"#da3633",not_enriched:"#30363d"};
  ord.forEach(function(k){total+=(f[k]||0)});
  var mx=Math.max.apply(null,ord.map(function(k){return f[k]||0}).concat([1]));
  var fh="";
  ord.forEach(function(k){
    var v=f[k]||0;
    if(v>0){
      var pct=total>0?Math.round(v/total*100):0;
      fh+='<div class="fun-row"><div class="fun-icon" style="background:'+(icons[k]||"#30363d")+'"></div><div class="fun-name">'+k.replace(/_/g," ")+'</div><div class="fun-count">'+v+'</div><div class="fun-bar-wrap"><div class="fun-bar '+(colors[k]||"bar-x")+'" style="width:'+Math.max(v/mx*100,2)+'%"></div></div><div class="fun-pct">'+pct+'%</div></div>';
    }
  });
  G("funnel").innerHTML=fh||'<div class="empty">No data</div>';

  var cr=d.credits||{};
  var crh="";
  Object.keys(cr).sort().forEach(function(p){
    var i=cr[p];
    var tot=(i.active||0)+(i.depleted||0)+(i.reserve||0)+(i.processing||0);
    var alive=(i.active||0)+(i.reserve||0);
    var pct=tot>0?Math.round(alive/tot*100):0;
    var cls=pct>60?"hi":pct>30?"md":"lo";
    var clr=pct>60?"#238636":pct>30?"#9e6a03":"#da3633";
    crh+='<div class="cr-row"><div class="cr-top"><span class="cr-provider">'+p+'</span><div class="cr-pct '+cls+'">'+pct+'%</div></div>';
    crh+='<div class="cr-bar"><div class="cr-fill" style="width:'+pct+'%;background:'+clr+'"></div></div>';
    crh+='<div class="cr-detail">'+alive+' of '+tot+' accounts active';
    if(i.credits)crh+=' &middot; '+i.credits.toLocaleString()+' credits';
    crh+='</div></div>';
  });
  G("credits").innerHTML=crh||'<div class="empty">No accounts</div>';

  var q=d.queue||{};
  var qh="";
  Object.keys(q).forEach(function(k){
    qh+='<div class="q-item"><span>'+uc(k.replace("awaiting_",""))+'</span><span class="q-badge '+(q[k]>0?"q-hi":"q-lo")+'">'+q[k]+'</span></div>';
  });
  G("queue").innerHTML=qh;

  var tk=d.tasks||[];
  G("tasks").innerHTML=tk.length?tk.map(function(t){
    var m=t.minutes||0,sc=m>15;
    return'<div class="task"><div class="pulse'+(sc?" stuck":"")+'"></div><div class="task-name">'+t.company+'</div><span class="task-tag">'+t.status+'</span><span class="task-time'+(sc?" danger":m>10?" warn":"")+'">'+m+'m'+(sc?" STUCK":"")+'</span></div>';
  }).join(""):'<div class="empty">No active tasks</div>';

  var ac=d.logs||[];
  var cats={};
  ac.forEach(function(a){var c=getCat(a.action);cats[c]=(cats[c]||0)+1});
  var fb='<button class="log-btn'+(curF==="all"?" act":"")+'" onclick="setF(\'all\')">All ('+ac.length+')</button>';
  Object.keys(cats).sort().forEach(function(c){
    fb+='<button class="log-btn'+(curF===c?" act":"")+'" onclick="setF(\''+c+'\')">'+uc(c)+' ('+cats[c]+')</button>';
  });
  G("logF").innerHTML=fb;

  var lh="";
  ac.forEach(function(a){
    var c=getCat(a.action);
    var vis=curF==="all"||curF===c;
    var det=a.details||{};
    var msg=det.company_name||det.count||(det.stuck_tasks_reset!==undefined?"stuck="+det.stuck_tasks_reset:"")||"";
    lh+='<div class="log" data-cat="'+c+'" style="'+(vis?"":"display:none")+'"><span class="log-time">'+a.ago+'</span><span class="log-tag '+tagCls(c)+'">'+c+'</span><span class="log-msg">'+a.action.replace(/_/g," ")+(msg?" &middot; "+msg:"")+'</span>';
    if(det.count)lh+='<span class="log-cnt">'+det.count+'</span>';
    lh+='</div>';
  });
  G("logs").innerHTML=lh||'<div class="empty">No activity</div>';
}

function setF(f){
  curF=f;
  var btns=document.querySelectorAll(".log-btn");
  for(var i=0;i<btns.length;i++){
    var txt=btns[i].textContent.toLowerCase();
    btns[i].className="log-btn"+((f==="all"&&txt.indexOf("all")>=0)||(f!=="all"&&txt.indexOf(f)>=0)?" act":"");
  }
  var logs=document.querySelectorAll(".log");
  for(var j=0;j<logs.length;j++){
    logs[j].style.display=(f==="all"||logs[j].getAttribute("data-cat")===f)?"":"none";
  }
}

function load(){
  api({action:"status"}).then(function(d){
    render(d);
    G("dot").className="dot dot-ok";
    G("upd").textContent="Updated "+new Date().toLocaleTimeString();
  }).catch(function(e){
    G("dot").className="dot dot-err";
    G("upd").textContent="Error: "+e.message;
  });
}
load();
setInterval(load,30000);
</script>
</body>
</html>
